<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disaster Prep Quest</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container { max-width: 800px; width: 100%; text-align: center; }
        h1 { font-size: 2.5em; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .subtitle { font-size: 1.2em; margin-bottom: 30px; opacity: 0.9; }
        .score { 
            background: rgba(255,255,255,0.2); 
            padding: 15px 30px; 
            border-radius: 50px; 
            font-size: 1.5em; 
            font-weight: bold;
            margin-bottom: 20px;
        }
        .scenario { 
            background: rgba(0,0,0,0.3); 
            padding: 30px; 
            border-radius: 20px; 
            margin-bottom: 30px; 
            font-size: 1.3em; 
            line-height: 1.5;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .choices { display: flex; flex-direction: column; gap: 15px; max-width: 600px; margin: 0 auto; }
        .choice-btn {
            background: linear-gradient(45deg, #ff6b6b, #ee5a52);
            color: white;
            border: none;
            padding: 20px 30px;
            font-size: 1.2em;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            width: 100%;
        }
        .choice-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,0.3); }
        .choice-btn:active { transform: translateY(0); }
        .choice-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .feedback {
            margin-top: 20px;
            padding: 25px;
            border-radius: 15px;
            font-size: 1.2em;
            font-weight: bold;
            min-height: 80px;
            display: none;
        }
        .safe { background: rgba(46, 204, 113, 0.9); border: 3px solid #27ae60; }
        .risky { background: rgba(241, 196, 15, 0.9); border: 3px solid #f39c12; }
        .dangerous { background: rgba(231, 76, 60, 0.9); border: 3px solid #c0392b; }
        .hidden { display: none !important; }
        .restart-btn { 
            background: linear-gradient(45deg, #667eea, #764ba2); 
            margin-top: 30px; 
            padding: 15px 40px; 
            font-size: 1.2em;
        }
        .progress { 
            width: 100%; 
            height: 12px; 
            background: rgba(255,255,255,0.2); 
            border-radius: 6px; 
            margin: 20px 0; 
            overflow: hidden;
        }
        .progress-bar { 
            height: 100%; 
            background: linear-gradient(90deg, #f39c12, #e67e22); 
            width: 0%; 
            transition: width 0.5s ease;
        }
        .step-info { font-size: 1.1em; color: #ffd700; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚨 Disaster Prep Quest 🚨</h1>
        <p class="subtitle">Real FEMA/Red Cross safety training game</p>
        
        <div class="score">Score: <span id="score">0</span>/100</div>
        <div class="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="step-info" id="stepInfo">Choose your disaster!</div>
        
        <!-- Start Screen -->
        <div id="startScreen">
            <div class="scenario">
                <strong>Pick your disaster survival challenge!</strong><br><br>
                Test your knowledge of REAL safety protocols.
            </div>
            <div class="choices">
                <button class="choice-btn" onclick="loadDisaster(0)">🌍 Earthquake</button>
                <button class="choice-btn" onclick="loadDisaster(1)">🌊 Flood</button>
                <button class="choice-btn" onclick="loadDisaster(2)">🔥 House Fire</button>
                <button class="choice-btn" onclick="loadDisaster(3)">🌪️ Hurricane</button>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="gameScreen" class="hidden">
            <div class="scenario" id="scenarioText"></div>
            <div class="choices" id="choiceContainer"></div>
            <div class="feedback" id="feedback"></div>
            <button class="choice-btn restart-btn" onclick="restartGame()">🔄 New Disaster</button>
        </div>
    </div>

    <script>
        // FULL GAME DATA - All disasters ready!
        const disasters = {
            0: { name: "🌍 EARTHQUAKE", steps: [
                {
                    question: "You're at home. Ground SHAKES violently! FIRST action?",
                    choices: [
                        "1️⃣ Run outside to street",
                        "2️⃣ Drop, Cover under table, Hold On",
                        "3️⃣ Stand in doorway", 
                        "4️⃣ Hide in bathtub"
                    ],
                    correct: 1,
                    feedback: {
                        0: { type: "dangerous", text: "❌ DEADLY! Falling debris outside kills most. Stay inside!" },
                        1: { type: "safe", text: "✅ PERFECT! FEMA: 'Drop, Cover, Hold On' saves lives!" },
                        2: { type: "risky", text: "⚠️ Myth! Doorways aren't safe anymore." },
                        3: { type: "risky", text: "⚠️ Bathtub good for aftershocks, not first shake." }
                    }
                },
                {
                    question: "Shaking stops. Aftershocks coming! Next?",
                    choices: [
                        "1️⃣ Check gas leaks/injuries first",
                        "2️⃣ Open all windows immediately", 
                        "3️⃣ Go back to sleep"
                    ],
                    correct: 0,
                    feedback: {
                        0: { type: "safe", text: "✅ YES! Smell rotten eggs? Gas leak. Check people first!" },
                        1: { type: "dangerous", text: "❌ NO! Could spread gas if leaking!" },
                        2: { type: "dangerous", text: "❌ Aftershocks destroy weakened buildings!" }
                    }
                }
            ]},
            1: { name: "🌊 FLOOD", steps: [
                {
                    question: "Flash flood warning! 6 inches of moving water...?",
                    choices: [
                        "1️⃣ Drive through to get home",
                        "2️⃣ Turn around, go higher ground",
                        "3️⃣ Wait in car"
                    ],
                    correct: 1,
                    feedback: {
                        0: { type: "dangerous", text: "❌ 6in water = 2,000lb force! Cars swept away!" },
                        1: { type: "safe", text: "✅ TURN AROUND! Never drive through floodwater (Red Cross)." },
                        2: { type: "dangerous", text: "❌ Water rises fast. Get to HIGH GROUND!" }
                    }
                }
            ]},
            2: { name: "🔥 HOUSE FIRE", steps: [
                {
                    question: "Smoke alarm blares! You smell smoke. FIRST?",
                    choices: [
                        "1️⃣ Grab valuables",
                        "2️⃣ Get low, test door with back of hand",
                        "3️⃣ Run to windows"
                    ],
                    correct: 1,
                    feedback: {
                        0: { type: "dangerous", text: "❌ Seconds matter! Get out NOW!" },
                        1: { type: "safe", text: "✅ YES! Stay low (smoke rises), feel door (hot=use window)." },
                        2: { type: "risky", text: "⚠️ Windows are 2nd choice if door hot." }
                    }
                }
            ]},
            3: { name: "🌪️ HURRICANE", steps: [
                {
                    question: "Hurricane approaching! Best prep?",
                    choices: [
                        "1️⃣ Board up windows",
                        "2️⃣ Fill bathtubs with water",
                        "3️⃣ Evacuate beaches"
                    ],
                    correct: 2,
                    feedback: {
                        0: { type: "risky", text: "⚠️ Good, but water is critical too." },
                        1: { type: "risky", text: "⚠️ Smart for flushing toilets post-power loss." },
                        2: { type: "safe", text: "✅ PRIORITY #1! Storm surge kills most (FEMA)." }
                    }
                }
            ]}
        };

        let currentDisasterId = -1;
        let currentStep = 0;
        let score = 0;

        function loadDisaster(disasterId) {
            currentDisasterId = disasterId;
            currentStep = 0;
            score = 0;
            updateUI();
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameScreen').classList.remove('hidden');
            showCurrentStep();
        }

        function showCurrentStep() {
            const disaster = disasters[currentDisasterId];
            const step = disaster.steps[currentStep];
            
            document.getElementById('scenarioText').innerHTML = 
                `<strong>${disaster.name}</strong><br><br>${step.question}`;
            
            const container = document.getElementById('choiceContainer');
            container.innerHTML = '';
            
            step.choices.forEach((choiceText, index) => {
                const button = document.createElement('button');
                button.className = 'choice-btn';
                button.textContent = choiceText;
                button.onclick = () => handleChoice(index, step);
                container.appendChild(button);
            });
            
            document.getElementById('feedback').style.display = 'none';
            document.querySelectorAll('.choice-btn').forEach(btn => btn.disabled = false);
            
            document.getElementById('stepInfo').textContent = 
                `Step ${currentStep + 1} of ${disaster.steps.length}`;
        }

        function handleChoice(choiceIndex, step) {
            // Disable all buttons
            document.querySelectorAll('.choice-btn').forEach(btn => btn.disabled = true);
            
            const feedback = step.feedback[choiceIndex];
            const feedbackEl = document.getElementById('feedback');
            
            feedbackEl.textContent = feedback.text;
            feedbackEl.className = `feedback ${feedback.type}`;
            feedbackEl.style.display = 'block';
            
            // Update score
            if (choiceIndex === step.correct) {
                score += 10;
            } else if (feedback.type === 'risky') {
                score += 5;
            }
            
            updateUI();
            
            // Next step or end
            setTimeout(() => {
                currentStep++;
                const disaster = disasters[currentDisasterId];
                if (currentStep >= disaster.steps.length) {
                    showGameComplete();
                } else {
                    showCurrentStep();
                }
            }, 3000);
        }

        function showGameComplete() {
            document.getElementById('scenarioText').innerHTML = 
                `🎉 <strong>${disasters[currentDisasterId].name} COMPLETE!</strong><br><br>Final Score: ${score}/100`;
            document.getElementById('choiceContainer').innerHTML = '';
            document.getElementById('stepInfo').textContent = 'Mission Accomplished! 👏';
        }

        function updateUI() {
            document.getElementById('score').textContent = score;
            const progress = Math.min((score / 100) * 100, 100);
            document.getElementById('progressBar').style.width = progress + '%';
        }

        function restartGame() {
            document.getElementById('gameScreen').classList.add('hidden');
            document.getElementById('startScreen').classList.remove('hidden');
            document.getElementById('stepInfo').textContent = 'Choose your disaster!';
        }
    </script>
</body>
</html>
